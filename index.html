<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hüseyin ❤️ Sude</title>
    <style>
        body { background-color: #ff69b4; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: rgba(255, 255, 255, 0.2); padding: 20px; border-radius: 15px; }
        h1 { font-size: 2.2em; margin-bottom: 10px; }
        #timer { font-size: 1.1em; font-weight: bold; margin: 20px 0; background: white; color: #ff69b4; padding: 10px; border-radius: 10px; }
        .gallery img { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 3px solid white; display: block; }
        .map-container { margin-top: 20px; border-radius: 10px; overflow: hidden; }
        audio { width: 100%; margin-top: 20px; }
        .footer { margin-top: 30px; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>Seni Çok Seviyorum Sude...</h1>
    <p><i>"Sen benim en güzel hikayemsin..."</i></p>
    
    <div id="timer">Zaman Akıyor... ❤️</div>

    <div class="gallery">
        <img src="img1.jpg" alt="Bizim Anımız">
        <img src="img2.jpg" alt="Bizim Anımız">
        <img src="img3.jpg" alt="Bizim Anımız">
        <img src="img4.jpg" alt="Bizim Anımız">
        <img src="img5.jpg" alt="Bizim Anımız">
    </div>

    <h3>İlk Buluşma Yerimiz: Karacasu 📍</h3>
    <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12702.456!2d28.61!3d37.73!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14c6e!2sKaracasu%2C%20Ayd%C4%B1n" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <p style="margin-top:20px;">Müziği Başlat: 👇</p>
    <audio id="myAudio" controls loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="footer">
        <p>Benimle bir ömür geçirir misin? 💍</p>
        <p>❤️ 12.01.2026 ❤️</p>
    </div>
</div>

<script>
    const startDate = new Date("2026-01-12T00:00:00");
    setInterval(() => {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / (1000 * 60)) % 60);
        const secs = Math.floor((diff / 1000) % 60);
        document.getElementById("timer").innerHTML = days + " gün " + hours + " saat " + mins + " dakika " + secs + " saniye ❤️";
    }, 1000);
</script>

</body>
</html>
